apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: calendar-api-alerts
  labels:
    app.kubernetes.io/name: calendar-api
    release: prometheus
spec:
  groups:
    - name: calendar-api.availability
      rules:
        - alert: calendar-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="calendar-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="calendar-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Commerce
          annotations:
            summary: calendar-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: calendar-apiUnavailable
          expr: up{job="calendar-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Commerce
          annotations:
            summary: calendar-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
