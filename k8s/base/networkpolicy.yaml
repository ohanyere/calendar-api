apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: calendar-api
  labels:
    app.kubernetes.io/name: calendar-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: calendar-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 443
